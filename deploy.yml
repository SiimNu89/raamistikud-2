import: 
  - recipe/laravel.php

config:
  repository: 'https://github.com/SiimNu89/raamistikud-2.git'
  keep_releases: 2
  # MUUDATUS SIIN: Kasutame lühemat nime või serveri vaikimisi PHP-d
  bin/php: php84 
  http_user: virt137761
  writable_mode: chmod
  writable_dirs:
    - storage
    - bootstrap/cache

hosts:
  stage:
    hostname: 'ta24nurja.itmajakas.ee'
    remote_user: virt137761
    deploy_path: '~/domeenid/www.ta24nurja.itmajakas.ee/raamistikud'

tasks:
  npm:production:
    - run: 'cd {{release_path}} && npm install --legacy-peer-deps'
    - run: 'cd {{release_path}} && npm run build'

  opcache:clear:
    # Siin muudame samuti killall käsku, et see ei sõltuks konkreetsest versioonist nii rangelt
    - run: killall php-cgi || true

  deploy:
    - 'deploy:prepare'
    - 'deploy:vendors'
    - 'npm:production'
    - 'artisan:storage:link'
    - 'artisan:config:cache'
    - 'artisan:route:cache'
    - 'artisan:view:cache'
    - 'deploy:publish'

after:
  deploy:failed: deploy:unlock

before:
  deploy:success: opcache:clear