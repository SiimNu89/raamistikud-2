import: 
  - recipe/laravel.php

config:
  repository: 'https://github.com/SiimNu89/raamistikud-2.git'
  keep_releases: 2
  # Lisame siia php tee, et artisan käsud kindlalt õige versiooniga jookseks
  bin/php: /usr/bin/php84 

hosts:
  stage:
    hostname: 'ta24nurja.itmajakas.ee'
    remote_user: virt137761
    deploy_path: '~/domeenid/www.ta24nurja.itmajakas.ee/raamistikud'

tasks:
  npm:production:
    # Kasutame installi koos legacy-peer-deps-iga, et vältida konflikte
    - run: 'cd {{release_path}} && npm install --legacy-peer-deps'
    # KASUTA SEDA KÄSKU: See tekitab public/build kausta ja manifest.json faili
    - run: 'cd {{release_path}} && npm run build'

  opcache:clear:
    - run: killall php84-cgi || true

  deploy:
    - 'deploy:prepare'
    - 'deploy:vendors'
    - 'npm:production'      # See käivitab nüüd õige buildi
    - 'artisan:storage:link'
    - 'artisan:view:cache'  # Puhastame vaated
    - 'artisan:config:cache'
    - 'deploy:publish'

after:
  deploy:failed: deploy:unlock

before:
  deploy:success: opcache:clear